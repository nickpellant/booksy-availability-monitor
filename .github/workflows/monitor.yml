name: booksy-availability-monitor

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min (GitHub may delay 5-15 min under load)
  workflow_dispatch: {} # manual test runs

# Prevent overlapping runs stomping on state.json.
concurrency:
  group: booksy-availability-monitor
  cancel-in-progress: false

permissions:
  contents: write # commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE: ${{ vars.TARGET_DATE }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME }}
        run: node monitor.js

      - name: Persist state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update state [skip ci]"
          # Rebase on any commit that landed since checkout so the push isn't
          # rejected as non-fast-forward (which would drop this run's state).
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push

      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error.png
          if-no-files-found: ignore
