name: booksy-availability-monitor

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min (GitHub may delay 5-15 min under load)
  workflow_dispatch: {} # manual test runs

# Prevent overlapping runs racing on the state cache.
concurrency:
  group: booksy-availability-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Dedupe state lives in the Actions cache, NOT git — a unique key each run
      # (cache entries are immutable) plus a prefix restore-key to load the most
      # recent previous state. Avoids commit/push/rebase conflicts entirely.
      # Worst case (rare cache eviction) is one duplicate alert.
      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: state.json
          key: booksy-state-${{ github.run_id }}
          restore-keys: |
            booksy-state-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TARGET_DATE: ${{ vars.TARGET_DATE }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME }}
        run: node monitor.js

      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error.png
          if-no-files-found: ignore
